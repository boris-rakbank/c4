name: c4
region: fra

static_sites:
  - name: c4
    github:
      repo: go-teal/c4
      branch: main
      # Deployments are triggered explicitly by the GitHub Actions
      # workflow (see .github/workflows/deploy.yml) after CI builds pass,
      # so DO should not also auto-deploy on every push.
      deploy_on_push: false
    source_dir: /
    build_command: npm ci && npm run build
    output_dir: dist
    environment_slug: node-js
    # Vite SPA fallback — any unknown path falls back to index.html so
    # client-side routing (if added later) works out of the box.
    catchall_document: index.html
    # Long-cache static assets; index.html stays no-cache via the
    # default App Platform headers.
    routes:
      - path: /
